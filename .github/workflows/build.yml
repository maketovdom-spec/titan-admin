name: Build TITAN Admin APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good autoconf automake libtool pkg-config python3-dev

    - name: Set environment
      run: |
        echo "BUILDOZER_ALLOW_ROOT=1" >> $GITHUB_ENV
        echo "ANDROID_SDK_ACCEPT_LICENSES=true" >> $GITHUB_ENV

    - name: Accept Android SDK licenses
      run: |
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TITAN-Admin-APK
        path: bin/*.apk
